name: Build (on demand)

# Build installers in the cloud WITHOUT cutting a release — for when you can't
# install Rust locally. Trigger manually: GitHub → Actions → "Build (on demand)"
# → Run workflow. Download the installer from the run's Artifacts when it finishes.
on:
  workflow_dispatch:


jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, macos-latest, ubuntu-22.04 ]
    runs-on: ${{ matrix.os }}
    env:
      # secrets can't be used in `if:` directly — collapse to a boolean string here.
      SIGN_WINDOWS: ${{ secrets.WINDOWS_CERTIFICATE != '' }}
    steps:
    - uses: actions/checkout@v4
    - uses: oven-sh/setup-bun@v2
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: "src-tauri -> target"

    - name: Install Linux deps for Tauri
      if: matrix.os == 'ubuntu-22.04'
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev

    - name: Install dependencies
      run: bun install --frozen-lockfile

    # Code-sign the Windows build (skipped if WINDOWS_CERTIFICATE secret unset).
    - name: Sign Windows build
      if: runner.os == 'Windows' && env.SIGN_WINDOWS == 'true'
      shell: pwsh
      env:
        WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
        WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      run: |
        $pfx = "$env:RUNNER_TEMP\cert.pfx"
        [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
        $pw = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
        $cert = Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $pw
        $conf = "src-tauri/tauri.conf.json"
        $j = Get-Content $conf -Raw | ConvertFrom-Json
        $j.bundle.windows | Add-Member -Force certificateThumbprint $cert.Thumbprint
        $j.bundle.windows | Add-Member -Force digestAlgorithm "sha256"
        $j.bundle.windows | Add-Member -Force timestampUrl "http://timestamp.digicert.com"
        $j | ConvertTo-Json -Depth 100 | Set-Content $conf

    - name: Build installers
      uses: tauri-apps/tauri-action@v0
      env:
        OPENGIT_GH_CLIENT_ID: ${{ vars.OPENGIT_GH_CLIENT_ID }}
      with:
        tauriScript: bun run tauri
        # No tagName → just build, don't publish a release.

    - name: Upload installers as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: OpenGit-${{ matrix.os }}
        if-no-files-error: ignore
        path: |
          src-tauri/target/release/bundle/**/*
          src-tauri/target/release/opengit.exe
